name: Release Gate
on:
  workflow_run:
    workflows: ["GH-Actions"]
    types: [completed]
  workflow_dispatch:

env:
  LUNAR_HUB_HOST: cronos.demo.earthly.dev
  LUNAR_HUB_GRPC_PORT: "443"
  LUNAR_HUB_HTTP_PORT: "443"
  LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
  COMPONENT: github.com/${{ github.repository }}

jobs:
  ok_release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Install Lunar CLI (from branch build)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://github.com/pantalasa-cronos/rust-service/releases/download/test-cli-build/lunar-linux-amd64 -o "$HOME/.local/bin/lunar"
          chmod +x "$HOME/.local/bin/lunar"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Wait for collectors to finish
        run: |
          echo "Waiting 120s for Lunar collectors to process this commit..."
          sleep 120

      - name: Check release policies
        run: |
          echo "=========================================="
          echo "  Lunar Release Gate"
          echo "=========================================="
          echo ""
          echo "Component: $COMPONENT"
          echo "Commit:    ${{ github.event.workflow_run.head_sha || github.sha }}"
          echo ""
          echo "Running release gate check..."
          if lunar policy ok-release "$COMPONENT" "${{ github.event.workflow_run.head_sha || github.sha }}"; then
            echo ""
            echo "✅ All release policies passed — proceeding with deploy."
          else
            echo ""
            echo "❌ Release blocked — one or more policies with enforcement"
            echo "   'block-release' or 'block-pr-and-release' are failing"
            echo "   for this commit."
            echo ""
            echo "   View details: https://cronos.demo.earthly.dev"
            exit 1
          fi

  release:
    needs: ok_release
    runs-on: ubuntu-latest
    steps:
      - name: Release
        run: |
          echo "🚀 Deploying ${{ github.repository }} @ ${{ github.event.workflow_run.head_sha || github.sha }}..."
          sleep 2
          echo "Deploy complete."
