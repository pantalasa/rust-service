name: Release Gate
on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  LUNAR_HUB_HOST: cronos.demo.earthly.dev
  LUNAR_HUB_GRPC_PORT: "443"
  LUNAR_HUB_HTTP_PORT: "443"
  LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
  COMPONENT: github.com/${{ github.repository }}

jobs:
  ok_release:
    runs-on: ubuntu-latest
    steps:
      - name: Install Lunar CLI (from branch build)
        run: |
          mkdir -p "$HOME/.local/bin"
          docker pull earthly/lunar-hub:brandon-ok-release-check-details
          docker create --name lunar-cli-extract earthly/lunar-hub:brandon-ok-release-check-details
          docker cp lunar-cli-extract:/bin/lunar "$HOME/.local/bin/lunar"
          docker rm lunar-cli-extract
          chmod +x "$HOME/.local/bin/lunar"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check release policies
        run: |
          echo "=========================================="
          echo "  Lunar Release Gate"
          echo "=========================================="
          echo ""
          echo "Component: $COMPONENT"
          echo "Commit:    ${{ github.sha }}"
          echo ""
          echo "Running release gate check..."
          if lunar policy ok-release "$COMPONENT" "${{ github.sha }}"; then
            echo ""
            echo "✅ All release policies passed — proceeding with deploy."
          else
            echo ""
            echo "❌ Release blocked — one or more policies with enforcement"
            echo "   'block-release' or 'block-pr-and-release' are failing"
            echo "   for this commit."
            echo ""
            echo "   View details: https://cronos.demo.earthly.dev"
            exit 1
          fi

  release:
    needs: ok_release
    runs-on: ubuntu-latest
    steps:
      - name: Release
        run: |
          echo "🚀 Deploying ${{ github.repository }} @ ${{ github.sha }}..."
          sleep 2
          echo "Deploy complete."
