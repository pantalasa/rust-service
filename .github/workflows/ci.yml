name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

env:
  CARGO_TERM_COLOR: always
  RUSTUP_TOOLCHAIN: 1.85.0

jobs:
  rust_service_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          clean: true
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential pkg-config libssl-dev
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.85.0
          . "$HOME/.cargo/env"
          rustup default 1.85.0
      - name: Build
        run: |
          . "$HOME/.cargo/env"
          cargo build
      - name: Test
        run: |
          . "$HOME/.cargo/env"
          cargo test
      - name: Build Docker image
        run: |
          docker build --pull --no-cache \
            --label git_sha=${{ github.sha }} \
            --label build_date=$(date -u +"%Y-%m-%dT%H:%M:%SZ") \
            --label version=${{ github.ref_name }} \
            --label repository=${{ github.repository }} \
            -t rust-service:${{ github.sha }} \
            .

  ok_release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: rust_service_build
    runs-on: ubuntu-latest
    env:
      LUNAR_HUB_HOST: lunar.demo.earthly.dev
      LUNAR_HUB_GRPC_PORT: "443"
      LUNAR_HUB_HTTP_PORT: "443"
      LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
      COMPONENT: github.com/${{ github.repository }}
      RELEASE_SHA: ${{ github.sha }}
    steps:
      - name: Install Lunar CLI
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://github.com/pantalasa/rust-service/releases/download/test-cli-build/lunar-linux-amd64 -o "$HOME/.local/bin/lunar"
          chmod +x "$HOME/.local/bin/lunar"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Check release policies
        run: |
          echo "=========================================="
          echo "  Lunar Release Gate"
          echo "=========================================="
          echo ""
          echo "Component: $COMPONENT"
          echo "Commit:    $RELEASE_SHA"
          echo ""
          echo "Running release gate check..."
          if lunar policy ok-release "$COMPONENT" "$RELEASE_SHA"; then
            echo ""
            echo "✅ All release policies passed — proceeding with deploy."
          else
            echo ""
            echo "❌ Release blocked — one or more policies with enforcement"
            echo "   'block-release' or 'block-pr-and-release' are failing"
            echo "   for this commit."
            echo ""
            echo "   View details: https://lunar.demo.earthly.dev"
            exit 1
          fi

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: ok_release
    runs-on: ubuntu-latest
    steps:
      - name: Release
        run: |
          echo "🚀 Deploying ${{ github.repository }} @ ${{ github.sha }}..."
          sleep 2
          echo "Deploy complete."
